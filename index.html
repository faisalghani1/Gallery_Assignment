<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        margin: 0;
        padding: 20px;
        background: #f2f2f2;
      }

      a {
        text-decoration: none;
        margin-left: 30px;
        color: rgb(64, 65, 65);
        font-size: 30px;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 20px;
      }

      .gallery img {
        width: 450px;
        height: 230px;
        object-fit: cover;
        border-radius: 10px;
        border-radius: 30px;
        margin: 20px;
        transition: 0.3s;
      }

      img:hover {
        transform: scale(1.05);
        box-shadow: 0 0 10px rgb(98, 95, 95);
      }
    </style>
  </head>
  <body>
    <a href="index.html">Gallery</a>
    <div class="gallery">
      <img src="pexels-giusxpe-36533817.jpg" />
      <img src="./pexels-kostas-dimopoulos-119583302-32924308.jpg" />
      <img src="./pexels-man-fong-wong-278505948-36634665.jpg" />
      <img src="./pexels-olgalioncat-7244431.jpg" />
      <img src="pexels-giusxpe-36533817.jpg" />
      <img src="./pexels-kostas-dimopoulos-119583302-32924308.jpg" />
      <img src="./pexels-man-fong-wong-278505948-36634665.jpg" />
      <img src="./pexels-olgalioncat-7244431.jpg" />
      <img src="pexels-giusxpe-36533817.jpg" />
    </div>
  </body>
</html>
